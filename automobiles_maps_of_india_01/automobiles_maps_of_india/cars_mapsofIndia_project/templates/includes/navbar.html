{% load static %}
<style>
    .blueline {
        height: 8px;
        width: 100%;
        background-color: #3cb3df;
    }
    .nav-wrapper{
        background-color: #F1F8F9; padding: 10px 0; display: flex; justify-content: center; align-items: center;
    }
    .nav-wrapper .nav-component{
        display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; padding: 0 20px;
    }
    .nav-wrapper .nav-component .left-components{
        display: flex; width:30%; justify-content:space-between;color: #282828;
    }
    .nav-wrapper .nav-component .left-components a,
    .nav-wrapper .nav-component .right-components a{
        color: #282828;text-decoration: none;
    }
    .nav-wrapper .nav-component .right-components{
        display: flex; width:45%; justify-content:space-between;
    }
    .middle-components{
        display: flex;  justify-content:space-between;
    }
    .middle-components img{
        height: 30px; margin-right: 10px;
    }
    .nav-input-component{
        display: flex; align-items: center; border: solid #ccc;
    }
    .nav-input-search{
        border: none; padding: 2px;
    }
    .nav-search-button{
        padding: 2px 10px; cursor: pointer;border:1px solid black;
    }

    /* Mobile Menu Toggle */
    .mobile-menu-toggle {
        display: none;
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #282828;
        padding: 5px;
    }

    /* Mobile Navigation */
    @media (max-width: 992px) {
        .nav-wrapper .nav-component .left-components {
            width: 35%;
        }
        
        .nav-wrapper .nav-component .right-components {
            width: 45%;
        }
        
        .nav-input-search {
            width: 120px;
            font-size: 12px;
        }
        
        .nav-search-button {
            padding: 2px 6px;
            font-size: 12px;
        }
    }

    @media (max-width: 768px) {
        .mobile-menu-toggle {
            display: block;
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1001;
        }
        
        .nav-wrapper .nav-component {
            position: relative;
            padding: 15px 20px;
        }
        
        .nav-wrapper .nav-component .left-components,
        .nav-wrapper .nav-component .right-components {
            display: none !important;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #F1F8F9;
            flex-direction: column;
            width: 100%;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        
        .nav-wrapper .nav-component .left-components.active,
        .nav-wrapper .nav-component .right-components.active {
            display: flex !important;
            z-index: 99999 !important;
        }
        
        .nav-wrapper .nav-component .left-components {
            top: 100%;
        }
        
        .nav-wrapper .nav-component .right-components {
            top: calc(100% + 174px);
        }
        
        .nav-wrapper .nav-component .left-components a,
        .nav-wrapper .nav-component .right-components a {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            display: block;
            width: 100%;
        }
        
        .nav-wrapper .nav-component .left-components a:last-child,
        .nav-wrapper .nav-component .right-components a:last-child {
            border-bottom: none;
        }
        
        .middle-components {
            margin: 0 auto;
        }
        
        .middle-components img {
            height: 25px;
        }
        
        .nav-input-component {
            margin-top: 10px;
            width: 100%;
        }
        .nav-input-component form{
            width:100% !important;
        }
        .nav-input-search {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        .nav-search-button {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: #3cb3df;
            color: #000;
            border: none;
            border-radius: 0px !important;
        }
    }

    @media (max-width: 480px) {
        .nav-wrapper .nav-component {
            padding: 10px 15px;
        }
        
        .middle-components img {
            height: 20px;
        }
        
        .nav-wrapper .nav-component .left-components,
        .nav-wrapper .nav-component .right-components {
            padding: 15px !important;
        }
    }
</style>
<div class="blueline"></div>
<nav class="nav-wrapper">
    <div class="nav-component">
        <button class="mobile-menu-toggle" id="menuToggle" onclick="toggleMobileMenu()">
    ☰
</button>

        
        <div class="left-components" id="leftNav">
            <a href="{% url 'home' %}"><b>Home</b></a>
            <a href="{% url 'cars' %}"><b>Cars</b></a>
            <a href="{% url 'bikes' %}"><b>Bikes</b></a>
            <a href="{% url 'services' %}"><b>Our Services</b></a>
        </div>

        <div class="middle-components">
            <img src="https://www.mapsofindia.com/style_2018/images/logo-moi.png" alt="Maps of India Logo">
        </div>

        <div class="right-components" id="rightNav">
            <a href="{% url 'about' %}"><b>About</b></a>
            <a href="{% url 'contact' %}"><b>Contact Us</b></a>
            <div class="nav-input-component">
                <form action="{% url 'search' %}" method="GET">
                    <input type="text" class="nav-input-search" name="keyword" placeholder="Search cars, bikes..." required>
                    <button type="submit" class="nav-search-button">Search</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<script>
function toggleMobileMenu() {
    const leftNav = document.getElementById('leftNav');
    const rightNav = document.getElementById('rightNav');
    const toggle = document.getElementById('menuToggle');

    const isActive = leftNav.classList.toggle('active');
    rightNav.classList.toggle('active');

    if (isActive) {
        toggle.innerHTML = "✖";
    } else {
        toggle.innerHTML = "☰";
    }
}


// Close mobile menu when clicking outside
document.addEventListener('click', function(event) {
    const nav = document.querySelector('.nav-wrapper');
    const leftNav = document.getElementById('leftNav');
    const rightNav = document.getElementById('rightNav');
    const toggle = document.querySelector('.mobile-menu-toggle');
    
    if (!nav.contains(event.target) || (leftNav.classList.contains('active') && !leftNav.contains(event.target) && !toggle.contains(event.target))) {
        leftNav.classList.remove('active');
        rightNav.classList.remove('active');
    }
});

// Close mobile menu when window is resized above mobile breakpoint
window.addEventListener('resize', function() {
    if (window.innerWidth > 768) {
        document.getElementById('leftNav').classList.remove('active');
        document.getElementById('rightNav').classList.remove('active');
        document.getElementById('menuToggle').innerHTML = "☰";
    }
});
</script>
