{% extends "base.html" %}

{% block title %}Vehicle Maintenance - Automobile Information{% endblock %}

{% block content %}

<br>
    <h1>{{ article.title }}</h1>

    <div class="content">
        {{ article.content|safe }}
    </div>

    <p class="text-muted mt-4">Last updated: {{ article.last_updated }}</p>



    <style>
        /* Add your custom styles here */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        header {
            background-color: #f4f4f4;
            padding: 1rem;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin-right: 10px;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .breadcrumb {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
        }

        .content {
            margin-top: 20px;
        }

        .related-links {
            margin-top: 40px;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 10px;
            background-color: #f4f4f4;
        }
    </style>
    <script>
        // Add your custom JavaScript here
        document.addEventListener('DOMContentLoaded', function() {
            // Example: Add smooth scrolling to all links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();

                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });
        });
    </script>
{% endblock %}
