{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Selector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .card-header {
            background-color: #4a69bd;
            color: white;
            border-bottom: none;
            padding: 20px;
        }
        .card-body {
            padding: 30px;
        }
        .form-label {
            font-weight: 600;
            color: #2c3e50;
        }
        .form-select {
            border-radius: 10px;
            border: 2px solid #bdc3c7;
            padding: 10px;
        }
        .form-select:focus {
            border-color: #4a69bd;
            box-shadow: 0 0 0 0.2rem rgba(74, 105, 189, 0.25);
        }
        .btn-primary {
            background-color: #4a69bd;
            border-color: #4a69bd;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #3c5aa6;
            border-color: #3c5aa6;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .icon-container i {
            font-size: 48px;
            color: #4a69bd;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header text-center">
            <h2><i class="fas fa-car-side me-2"></i>Vehicle Selector</h2>
        </div>
        <div class="card-body">
            <div class="icon-container">
                <i class="fas fa-car-side"></i>
            </div>
            <form id="vehicleForm">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="vehicleType" class="form-label">Select Vehicle Type</label>
                    <select class="form-select" id="vehicleType" name="vehicle_type" required>
                        <option value="">Choose...</option>
                        {% for vehicle_type in vehicle_types %}
                            <option value="{{ vehicle_type.id }}">{{ vehicle_type.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="manufacturer" class="form-label">Select Manufacturer</label>
                    <select class="form-select" id="manufacturer" name="manufacturer" required>
                        <option value="">Choose...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="model" class="form-label">Select Model</label>
                    <select class="form-select" id="model" name="model" required>
                        <option value="">Choose...</option>
                    </select>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check me-2"></i>Submit
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        const vehicleType = $('#vehicleType');
        const manufacturer = $('#manufacturer');
        const model = $('#model');
        const form = $('#vehicleForm');

        vehicleType.change(function() {
            manufacturer.html('<option value="">Choose...</option>');
            model.html('<option value="">Choose...</option>');

            if (this.value) {
                $.getJSON("{% url 'get_manufacturers' %}", {vehicle_type: this.value}, function(data) {
                    $.each(data, function(index, item) {
                        manufacturer.append($('<option>').text(item.name).attr('value', item.id));
                    });
                });
            }
        });

        manufacturer.change(function() {
            model.html('<option value="">Choose...</option>');

            if (this.value) {
                $.getJSON("{% url 'get_models' %}", {manufacturer: this.value}, function(data) {
                    $.each(data, function(index, item) {
                        model.append($('<option>').text(item.name).attr('value', item.id));
                    });
                });
            }
        });

        form.submit(function(e) {
            e.preventDefault();
            $.post("{% url 'submit_form' %}", $(this).serialize(), function(data) {
                if (data.status === 'success') {
                    alert(data.message);
                    form[0].reset();
                } else {
                    alert('Error: ' + data.message);
                }
            });
        });
    });
</script>
</body>
</html>
