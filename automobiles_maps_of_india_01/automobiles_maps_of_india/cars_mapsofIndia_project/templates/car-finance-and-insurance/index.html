<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Car Finance and Insurance{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Custom CSS */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        .header {
            background-color: #f8f9fa;
            padding: 20px 0;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<header class="header">
    <div class="container">
        <h1><a href="{% url 'article_list' %}">Car Finance and Insurance</a></h1>
        <nav>
            <a href="{% url 'finance_companies' %}">Finance Companies</a> |
            <a href="{% url 'insurance_companies' %}">Insurance Companies</a>
        </nav>
    </div>
</header>

<main class="container mt-4">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <div class="container">
        <p>&copy; 2024 Car Finance and Insurance. All rights reserved.</p>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
